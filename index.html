<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />

    <!-- Primary SEO -->
    <title>Zürcher Baumkarte – alle Stadtbäume interaktiv erkunden</title>
    <meta
      name="description"
      content="Interaktive Karte aller von der Stadt Zürich erfassten Bäume. Filtere nach Baumgattung, Baumart und Pflanzjahr und entdecke, welche Bäume in deinem Quartier wachsen. Quelle: Stadt Zürich."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#1d6f42" />
    <link rel="canonical" href="https://nurpinar.com/trees-zurich/" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zürcher Baumkarte – alle Stadtbäume interaktiv erkunden" />
    <meta
      property="og:description"
      content="Interaktive Karte aller von der Stadt Zürich erfassten Bäume. Filtere nach Gattung, Art und Pflanzjahr. Quelle: Stadt Zürich."
    />
    <meta property="og:url" content="https://nurpinar.com/trees-zurich/" />
    <meta property="og:locale" content="de_CH" />
    <!-- TODO: add a 1200×630 screenshot of the map saved as og-image.png in this folder -->
    <meta property="og:image" content="https://nurpinar.com/trees-zurich/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zürcher Baumkarte" />
    <meta
      name="twitter:description"
      content="Interaktive Karte aller Stadtbäume Zürichs – filterbar nach Gattung, Art und Pflanzjahr."
    />
    <meta name="twitter:image" content="https://nurpinar.com/trees-zurich/og-image.png" />

    <!-- Speed up first contact with the (keyless, account-free) map provider -->
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />

    <link href="./style.css" rel="stylesheet" />
    <!-- MapLibre GL JS (open-source, no Mapbox account / token needed) -->
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.css"
      type="text/css"
    />
    <!-- defer so these libraries no longer block the initial render. Deferred
         scripts run in document order, so maplibregl is ready before main.js. -->
    <script defer src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script
      defer
      src="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.min.js"
    ></script>
  </head>
  <body>
    <div class="app">
      <!-- Mobile toggle for the sidebar -->
      <button
        id="sidebar-toggle"
        class="sidebar-toggle"
        aria-controls="sidebar"
        aria-expanded="true"
      >
        ☰ Filter
      </button>

      <aside id="sidebar" class="sidebar">
        <header class="sidebar-header">
          <h1>Zürcher Baumkarte</h1>
          <p class="subtitle">
            Alle von der Stadt Zürich erfassten Bäume – filterbar nach Gattung,
            Art und Pflanzjahr.
          </p>
        </header>

        <noscript>
          <p>
            Diese Karte benötigt JavaScript. Die Daten stammen aus dem
            <a href="https://www.stadt-zuerich.ch/geodaten/" rel="noopener"
              >offenen Baumkataster der Stadt Zürich</a
            >.
          </p>
        </noscript>

        <section class="panel" aria-labelledby="filter-heading">
          <h2 id="filter-heading">Filter</h2>

          <label class="field">
            <span class="field-label">Baumgattung</span>
            <select id="baumgattung_id">
              <option value="0">Alle Gattungen</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Baumart</span>
            <select id="baumart_lat_id">
              <option value="0">Alle Arten</option>
            </select>
          </label>

          <fieldset class="field year-field">
            <legend class="field-label">Pflanzjahr</legend>
            <div class="year-inputs">
              <input id="year_min" type="number" aria-label="Pflanzjahr von" />
              <span aria-hidden="true">–</span>
              <input id="year_max" type="number" aria-label="Pflanzjahr bis" />
            </div>
          </fieldset>

          <div class="actions">
            <button id="apply_filters" class="btn btn-primary">Filtern</button>
            <button id="reset_filters" class="btn btn-secondary">
              Zurücksetzen
            </button>
          </div>
        </section>

        <section class="panel" aria-labelledby="collections-heading">
          <h2 id="collections-heading">Sammlungen</h2>
          <div id="collections" class="collections"></div>
        </section>

        <section class="panel" aria-labelledby="legend-heading">
          <h2 id="legend-heading">Legende · Baumgattung</h2>
          <div id="legend" class="legend"></div>
        </section>

        <footer class="sidebar-footer">
          <button id="open-stats" class="btn btn-secondary stats-open-btn">
            📊 Zahlen &amp; Trends
          </button>
          <output id="tree-count" class="tree-count" aria-live="polite"></output>
          <p class="source">Datenquelle: Stadt Zürich (Baumkataster)</p>
        </footer>
      </aside>

      <div
        id="map"
        role="application"
        aria-label="Interaktive Karte der Bäume in Zürich"
      ></div>
    </div>

    <!-- Zahlen & Trends -->
    <div
      id="stats-modal"
      class="stats-modal"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="stats-title"
    >
      <div class="stats-backdrop" data-close></div>
      <div class="stats-dialog">
        <button class="stats-close" data-close aria-label="Schliessen">×</button>
        <div id="stats-body"></div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
